version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: git-branch-pruner
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/arcmantle/git-branch-pruner/cmd.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
